{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — Elimu</title>
  <link rel="stylesheet" href="{% static 'landing/css/style.css' %}">
</head>
<body>

<nav>
  <a href="/" class="logo">elim<span>u</span></a>
  <div class="nav-links">
    <a href="/login/" class="btn">Log in</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>Create an account</h2>
    <p class="sub">For teachers and school administrators.</p>

    <form method="post" action="/signup/">
      {% csrf_token %}

      <label for="name">Full name</label>
      <input type="text" id="name" name="name" placeholder="Jane Mwangi" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@school.ac.ke" required>

      <label for="role">I am a</label>
      <select id="role" name="role" required>
        <option value="">Select role</option>
        <option value="teacher">Teacher</option>
        <option value="admin">School Administrator</option>
      </select>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required>

      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">Create account</button>
    </form>

    <p style="margin-top:1.25rem; font-size:0.78rem;">
      Already have an account? <a href="/login/" class="text-link">Log in</a>
    </p>
  </div>
</div>

<footer>
  <p>© 2025 Elimu · CBC-aligned AI learning · Kenya</p>
</footer>

</body>
</html>
